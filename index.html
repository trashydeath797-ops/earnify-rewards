<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Earnify Rewards</title>

<!-- Monetag SDK -->
<script src="//libtl.com/sdk.js"
data-zone="10913571"
data-sdk="show_10913571"></script>

<style>
/* (তোমার আগের style same রাখা হয়েছে, shorten না করে) */
body{
font-family: Arial;
background:#0b1020;
color:white;
text-align:center;
}

.btn{
padding:15px;
margin:10px;
font-size:16px;
cursor:pointer;
border-radius:10px;
border:none;
background:#7c3aed;
color:white;
width:90%;
max-width:300px;
}
</style>
</head>

<body>

<h2>Earnify Rewards</h2>

<button class="btn" id="btnInter">
🎬 Rewarded Interstitial (1 point)
</button>

<button class="btn" id="btnPop">
🎁 Rewarded Popup (1 point)
</button>

<button class="btn" id="btnDirect">
🔗 Direct Link (5 points)
</button>

<h3>Stats</h3>

<p>Ads watched:
<span id="watched">0</span>
</p>

<p>Total reward:
<span id="reward">0</span>
</p>

<p>Daily left:
<span id="left">150</span>
</p>

<script>

const CONFIG = {

maxAdsPerDay:150

};

let state = {

watched:0,
reward:0,
dayWatchCount:0

};

function updateUI(){

document.getElementById("watched").textContent =
state.watched;

document.getElementById("reward").textContent =
state.reward;

document.getElementById("left").textContent =
CONFIG.maxAdsPerDay - state.dayWatchCount;

}

function sdkAvailable(){

return typeof window.show_10913571 === 'function';

}

function canWatch(){

if(state.dayWatchCount>=CONFIG.maxAdsPerDay){

alert("Daily limit reached");
return false;

}

return true;

}

/* ---------- Interstitial ---------- */

async function showInterstitial(){

if(!canWatch()) return;

try{

await window.show_10913571();

setTimeout(()=>{

state.watched++;
state.reward+=1;
state.dayWatchCount++;

updateUI();

},4000);

}

catch{

alert("Ad failed");

}

}

/* ---------- Popup ---------- */

async function showPopup(){

if(!canWatch()) return;

try{

await window.show_10913571('pop');

setTimeout(()=>{

state.watched++;
state.reward+=1;
state.dayWatchCount++;

updateUI();

},4000);

}

catch{

alert("Popup failed");

}

}

/* ---------- Direct Link ---------- */

function openDirectLink(){

if(!canWatch()) return;

window.open(
"https://omg10.com/4/9791572",
"_blank"
);

setTimeout(()=>{

state.watched++;
state.reward+=5;
state.dayWatchCount++;

updateUI();

},5000);

}

/* ---------- Auto In-App ---------- */

function autoInApp(){

if(!canWatch()) return;

try{

window.show_10913571({

type:'inApp',

inAppSettings:{

frequency:2,
interval:30

}

});

setTimeout(()=>{

state.watched++;
state.reward+=1;
state.dayWatchCount++;

updateUI();

},4000);

}

catch{}

}

/* Auto every 35 sec */

setInterval(()=>{

if(sdkAvailable()){

autoInApp();

}

},35000);

/* Buttons */

document
.getElementById("btnInter")
.onclick=showInterstitial;

document
.getElementById("btnPop")
.onclick=showPopup;

document
.getElementById("btnDirect")
.onclick=openDirectLink;

updateUI();

</script>

</body>
</html>
